version: '3.8'

# ==============================================================================
# YAML ANCHORS (REUSABLE CONFIGS)
# ==============================================================================
x-n8n-base: &service-n8n
  image: docker.n8n.io/n8nio/n8n
  networks:
    - autonomous-net
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_USER=${DB_USER:-autonomous}
    - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-changeme}
    - DB_POSTGRESDB_DATABASE=n8n
    - GENERIC_TIMEZONE=${TZ:-Europe/Warsaw}
    - N8N_SECURE_COOKIE=true

# ==============================================================================
# NETWORKS & VOLUMES
# ==============================================================================
networks:
  autonomous-net:
    name: autonomous-net
    driver: bridge

volumes:
  postgres_data:
  n8n_data:
  qdrant_data:
  ollama_data:
  prometheus_data:
  grafana_data:

# ==============================================================================
# SERVICES
# ==============================================================================
services:

  # --- CORE DATABASE ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    networks:
      - autonomous-net
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-autonomous}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
      - POSTGRES_DB=autonomous
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-autonomous} -d autonomous"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- AUTOMATION LAYER (n8n) ---
  n8n:
    <<: *service-n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  # --- DIGITAL TWIN LAYER ---
  digital-twin-api:
    build:
      context: ./scripts
      dockerfile: Dockerfile.digital-twin
    container_name: digital-twin-api
    networks:
      - autonomous-net
    restart: unless-stopped
    ports:
      - "5677:5677"
    environment:
      - DB_USER=${DB_USER:-autonomous}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_HOST=postgres
      - DB_PORT=5432
      - TZ=${TZ:-Europe/Warsaw}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./docs:/app/docs:rw
      - ./scripts:/app:rw
      - ./.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy

  # --- AI & VECTOR LAYER ---
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    networks:
      - autonomous-net
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    networks:
      - autonomous-net
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # --- MONITORING STACK ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - autonomous-net
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - autonomous-net
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - grafana_data:/var/lib/grafana
